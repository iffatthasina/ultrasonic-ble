<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transit Seat Availability</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    /* Header */
    .header {
      background: #2F80ED;
      color: white;
      padding: 16px;
      font-size: 20px;
      font-weight: bold;
    }

    /* Container */
    .container {
      padding: 16px;
    }

    /* Card */
    .card {
      background: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 16px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .route {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .destination {
      color: gray;
      margin-bottom: 12px;
    }

    .availability {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .status {
      font-size: 14px;
      font-weight: bold;
    }

    .good {
      color: green;
    }

    .full {
      color: red;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 12px;
      border: none;
      border-radius: 8px;
      background: #2F80ED;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div class="header">Transit Tracker</div>

  <div class="container">

    <div class="card">
      <div class="route">F</div>
      <div class="destination">Downtown Berkeley</div>

      <div id="availability" class="availability">
        Seat Availability: 0/37
      </div>

      <div id="status" class="status good">
        GOOD TO BOARD
      </div>

      <button id="connect">Connect to Sensor</button>
    </div>

  </div>

  <script>
    const threshold = 20;   // adjust this!
    const maxSeats = 37;

    document.getElementById('connect').addEventListener('click', async () => {
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'UltrasonicSensor' }],
          optionalServices: [0x180C]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(0x180C);
        const characteristic = await service.getCharacteristic(0x2A56);

        await characteristic.startNotifications();

        characteristic.addEventListener('characteristicvaluechanged', event => {
          const raw = new TextDecoder().decode(event.target.value);
          const distance = parseInt(raw);

          let occupied = (distance < threshold) ? 1 : 0;

          // Update availability
          const availabilityEl = document.getElementById('availability');
          availabilityEl.textContent = `Seat Availability: ${occupied}/${maxSeats}`;

          // Update status
          const statusEl = document.getElementById('status');

          if (occupied === 1) {
            statusEl.textContent = "FULL - CONSIDER ALTERNATIVE ROUTE";
            statusEl.className = "status full";
          } else {
            statusEl.textContent = "GOOD TO BOARD";
            statusEl.className = "status good";
          }
        });

        document.getElementById('connect').textContent = "Connected ✅";

      } catch (err) {
        alert("Failed: " + err);
      }
    });
  </script>

</body>
</html>
