<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultrasonic Sensor Live</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 2rem;
      background: #f0f0f0;
    }
    h1 {
      color: #333;
    }
    #distance {
      font-size: 3rem;
      color: #007AFF;
      margin: 2rem 0;
    }
    button {
      font-size: 1.2rem;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #007AFF;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #005FCC;
    }
  </style>
</head>
<body>

  <h1>Ultrasonic Sensor Live</h1>
  <button id="connect">Connect to Sensor</button>
  <div id="distance">Distance: 0 cm</div>

  <script>
    let distanceChar;

    document.getElementById('connect').addEventListener('click', async () => {
      try {
        // Request BLE device (FIXED UUID FORMAT)
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'UltrasonicSensor' }],
          optionalServices: [0x180C]  // ✅ FIXED
        });

        // Connect to GATT server
        const server = await device.gatt.connect();

        // Get service + characteristic (FIXED UUID FORMAT)
        const service = await server.getPrimaryService(0x180C);   // ✅ FIXED
        const characteristic = await service.getCharacteristic(0x2A56); // ✅ FIXED

        // Enable notifications
        await characteristic.startNotifications();

        characteristic.addEventListener('characteristicvaluechanged', event => {
          // Since Arduino sends STRING → decode text
          const value = new TextDecoder().decode(event.target.value);
          document.getElementById('distance').textContent = `Distance: ${value} cm`;
        });

        document.getElementById('connect').textContent = "Connected ✅";
        document.getElementById('connect').disabled = true;

      } catch (err) {
        console.error(err);
        alert("Failed to connect: " + err);
      }
    });
  </script>

</body>
</html>
