<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultrasonic Sensor Live</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 2rem;
      background: #f0f0f0;
    }
    h1 {
      color: #333;
    }
    #distance {
      font-size: 2rem;
      color: #007AFF;
      margin: 1rem 0;
    }
    #availability {
      font-size: 2rem;
      margin: 1rem 0;
      font-weight: bold;
    }
    button {
      font-size: 1.2rem;
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 8px;
      background: #007AFF;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #005FCC;
    }
  </style>
</head>
<body>

  <h1>Ultrasonic Sensor Live</h1>
  <button id="connect">Connect to Sensor</button>

  <div id="distance">Distance: 0 cm</div>
  <div id="availability">Seat Availability: 0/37</div>

  <script>
    const threshold = 20;   // 🔴 adjust this based on your sensor
    const maxSeats = 37;

    document.getElementById('connect').addEventListener('click', async () => {
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{ name: 'UltrasonicSensor' }],
          optionalServices: [0x180C]
        });

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(0x180C);
        const characteristic = await service.getCharacteristic(0x2A56);

        await characteristic.startNotifications();

        characteristic.addEventListener('characteristicvaluechanged', event => {
          const raw = new TextDecoder().decode(event.target.value);
          const distance = parseInt(raw);

          // Update distance display
          document.getElementById('distance').textContent =
            `Distance: ${distance} cm`;

          // 🔥 Convert to seat occupancy (0 or 1)
          let occupied = (distance < threshold) ? 1 : 0;

          // Update seat availability
          const availabilityText = `Seat Availability: ${occupied}/${maxSeats}`;
          const availabilityEl = document.getElementById('availability');

          availabilityEl.textContent = availabilityText;

          // Color feedback
          if (occupied === 1) {
            availabilityEl.style.color = 'red';
          } else {
            availabilityEl.style.color = 'green';
          }
        });

        document.getElementById('connect').textContent = "Connected ✅";
        document.getElementById('connect').disabled = true;

      } catch (err) {
        console.error(err);
        alert("Failed to connect: " + err);
      }
    });
  </script>

</body>
</html>
